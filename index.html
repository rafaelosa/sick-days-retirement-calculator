<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מנוע קיבוע זכויות - Lemoney</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f6f8;
  --card: #ffffff;
  --border: #e1e4e8;
  --text: #1f2328;
  --text-muted: #57606a;
  --primary: #0969da;
  --primary-hover: #0860c7;
  --success: #1a7f37;
  --warning: #9a6700;
  --danger: #cf222e;
  --code-bg: #f6f8fa;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Heebo", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  padding: 24px;
}

.container { max-width: 1100px; margin: 0 auto; }

header {
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 2px solid var(--border);
}
header h1 { font-size: 28px; font-weight: 700; }
header .subtitle { color: var(--text-muted); font-size: 14px; margin-top: 4px; }

.layout { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
@media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  box-shadow: var(--shadow);
}
.card h2 {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.field { margin-bottom: 14px; }
.field label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 4px;
  color: var(--text);
}
.field input, .field select {
  width: 100%;
  padding: 8px 10px;
  font: inherit;
  font-size: 14px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: white;
  direction: ltr;
  text-align: right;
}
.field input:focus, .field select:focus {
  outline: 2px solid var(--primary);
  outline-offset: -1px;
  border-color: var(--primary);
}
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.dynamic-list { margin-top: 12px; }
.dynamic-list-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.dynamic-list-header label { font-size: 13px; font-weight: 600; }

.list-item {
  display: grid;
  gap: 8px;
  padding: 10px;
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 8px;
}
.grant-item { grid-template-columns: 1fr 1fr auto; align-items: end; }
.commutation-item { grid-template-columns: 1fr auto; align-items: end; }

.list-item label {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 2px;
  display: block;
}
.list-item input {
  width: 100%;
  padding: 6px 8px;
  font-size: 13px;
  border: 1px solid var(--border);
  border-radius: 4px;
  direction: ltr;
  text-align: right;
}

button {
  font: inherit;
  cursor: pointer;
  border: none;
  border-radius: 6px;
  padding: 8px 14px;
  font-size: 14px;
  font-weight: 500;
  transition: background 0.15s;
}
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-add {
  background: white; color: var(--primary);
  border: 1px solid var(--border);
  font-size: 12px; padding: 4px 10px;
}
.btn-add:hover { background: var(--code-bg); }
.btn-remove {
  background: transparent; color: var(--danger);
  font-size: 18px; padding: 4px 8px;
  line-height: 1;
}
.btn-remove:hover { background: #ffebe9; border-radius: 4px; }
.btn-calculate {
  width: 100%;
  padding: 12px;
  font-size: 15px;
  font-weight: 600;
  margin-top: 16px;
}
.btn-secondary {
  background: white;
  color: var(--text);
  border: 1px solid var(--border);
  font-size: 13px;
  padding: 6px 12px;
}
.btn-secondary:hover { background: var(--code-bg); }
.actions-row { display: flex; gap: 8px; margin-top: 8px; }

/* Results */
#results { display: none; }
#results.visible { display: block; }

.result-section {
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.result-section:last-child { border-bottom: none; margin-bottom: 0; }
.result-section h3 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
}

.result-row {
  display: grid;
  grid-template-columns: 30px 1fr auto;
  gap: 12px;
  padding: 6px 0;
  align-items: center;
  font-size: 14px;
}
.result-row .ref {
  font-family: "SF Mono", Monaco, Consolas, monospace;
  font-size: 11px;
  color: var(--text-muted);
  background: var(--code-bg);
  padding: 2px 6px;
  border-radius: 3px;
  text-align: center;
}
.result-row .label { color: var(--text); }
.result-row .value {
  font-family: "SF Mono", Monaco, Consolas, monospace;
  font-weight: 600;
  font-size: 14px;
  direction: ltr;
}
.result-row.highlight .value { color: var(--success); font-size: 16px; }
.result-row.highlight .label { font-weight: 600; }

.error-msg {
  background: #ffebe9;
  border: 1px solid #ffcecb;
  color: var(--danger);
  padding: 12px;
  border-radius: 6px;
  margin-top: 12px;
  font-size: 13px;
}

.cap-info {
  background: #fff8c5;
  border: 1px solid #d4a72c;
  border-radius: 6px;
  padding: 10px 12px;
  margin: 8px 0;
  font-size: 13px;
}
.cap-info strong { color: var(--warning); }

.parity-banner {
  display: none;
  background: #dcfce7;
  border: 1px solid #16a34a;
  border-radius: 6px;
  padding: 10px 12px;
  margin-bottom: 16px;
  font-size: 13px;
  color: var(--success);
}
.parity-banner.visible { display: block; }
.parity-banner strong { font-weight: 600; }

footer {
  margin-top: 32px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-muted);
  text-align: center;
}
</style>
</head>
<body>
<div class="container">

<header>
  <h1>מנוע קיבוע זכויות</h1>
  <div class="subtitle">חישוב יתרת הון פטור וקצבה פטורה לפי סעיף 9א לפקודה (נוסחת השילוב) · Lemoney</div>
</header>

<div class="layout">

  <!-- ============== INPUTS ============== -->
  <div class="card">
    <h2>נתוני קלט</h2>

    <div class="field-row">
      <div class="field">
        <label>שנת פרישה</label>
        <input type="number" id="retirement-year" value="2025" min="1990" max="2028">
      </div>
      <div class="field">
        <label>שנות עבודה (ותק)</label>
        <input type="number" id="years-of-service" value="38" step="0.001" min="0">
      </div>
    </div>

    <div class="field">
      <label>שנת תחזית (לחישוב קצבה פטורה צפויה)</label>
      <input type="number" id="projection-year" value="2028" min="1990" max="2028">
    </div>

    <div class="dynamic-list">
      <div class="dynamic-list-header">
        <label>מענקי פרישה (כל מענק שהתקבל בעבר ובמועד הפרישה)</label>
        <button class="btn-add" id="add-grant">+ הוסף מענק</button>
      </div>
      <div id="grants-container"></div>
    </div>

    <div class="dynamic-list">
      <div class="dynamic-list-header">
        <label>היוונים (סכומי קצבה/תגמולים שהוונו)</label>
        <button class="btn-add" id="add-commutation">+ הוסף היוון</button>
      </div>
      <div id="commutations-container"></div>
    </div>

    <button class="btn-primary btn-calculate" id="calculate-btn">חשב קיבוע זכויות</button>

    <div class="actions-row">
      <button class="btn-secondary" id="load-excel-example">טען דוגמת אקסל</button>
      <button class="btn-secondary" id="clear-all">נקה הכל</button>
    </div>

    <div id="error-container"></div>
  </div>

  <!-- ============== RESULTS ============== -->
  <div class="card" id="results">
    <h2>תוצאות החישוב</h2>
    <div id="parity-banner" class="parity-banner"></div>
    <div id="results-content"></div>
  </div>

</div>

<footer>
  Lemoney · מנוע חישוב פנימי · מבוסס נתוני מדדים ופרמטרי שנת פרישה מוטמעים בקוד
</footer>

</div>

/* ============================================================
   שכבה 1: Lookups
   ============================================================ */
function getCpi(year, month) {
  const key = year + "-" + String(month).padStart(2, "0");
  const value = CPI_DATA[key];
  if (value === undefined) {
    throw new Error(`לא נמצא מדד עבור ${key}`);
  }
  return value;
}

function getRetirementParams(year) {
  const data = RETIREMENT_PARAMS[String(year)];
  if (!data) {
    throw new Error(`לא נמצאו פרמטרי פרישה לשנה ${year}`);
  }
  return {
    year: year,
    eligible_pension: data.eligible_pension,
    exemption_rate: data.exemption_rate,
    conversion_factor: 180.0
  };
}

function getReferenceCpiForRetirementYear(retirementYear) {
  return getCpi(retirementYear, 1);
}

/* ============================================================
   שכבה 2: Per-grant
   ============================================================ */
const DEFAULT_PENALTY_MULTIPLIER = 1.35;

function indexGrant(grant, referenceCpi) {
  let baseCpi;
  if (grant.base_cpi !== undefined && grant.base_cpi !== null) {
    baseCpi = grant.base_cpi;
  } else {
    baseCpi = getCpi(grant.year, grant.month);
  }
  const indexedAmount = grant.exempt_amount * (referenceCpi / baseCpi);
  return {
    year: grant.year,
    month: grant.month,
    exempt_amount: grant.exempt_amount,
    base_cpi: baseCpi,
    reference_cpi: referenceCpi,
    indexed_amount: indexedAmount,
    penalized_amount: 0
  };
}

function applyPenaltyMultiplier(indexedGrant, multiplier) {
  multiplier = multiplier !== undefined ? multiplier : DEFAULT_PENALTY_MULTIPLIER;
  return {
    ...indexedGrant,
    penalized_amount: indexedGrant.indexed_amount * multiplier
  };
}

/* ============================================================
   שכבה 3: Aggregation
   ============================================================ */
const YEARS_CAP = 32;

function sumGrantsGross(grants) {
  return grants.reduce((sum, g) => sum + g.exempt_amount, 0);
}

function sumGrantsIndexedAndPenalized(indexedGrants) {
  return indexedGrants.reduce((sum, g) => sum + g.penalized_amount, 0);
}

function applyYearsOfServiceCap(sumIndexedAndPenalized, yearsOfService) {
  if (yearsOfService <= YEARS_CAP) {
    return {
      was_capped: false,
      cap_ratio: 1.0,
      pre_cap_amount: sumIndexedAndPenalized,
      post_cap_amount: sumIndexedAndPenalized
    };
  }
  const capRatio = YEARS_CAP / yearsOfService;
  return {
    was_capped: true,
    cap_ratio: capRatio,
    pre_cap_amount: sumIndexedAndPenalized,
    post_cap_amount: sumIndexedAndPenalized * capRatio
  };
}

/* ============================================================
   שכבה 4: Capital
   ============================================================ */
function calculateTotalExemptionCap(params) {
  return params.eligible_pension * params.exemption_rate * params.conversion_factor;
}

function calculateCapitalAfterGrants(totalCap, cappedGrantsAmount) {
  return totalCap - cappedGrantsAmount;
}

function sumCommutations(commutations) {
  return commutations.reduce((s, v) => s + v, 0);
}

function calculateCapitalAfterCommutation(capitalAfterGrants, totalCommutation) {
  return capitalAfterGrants - totalCommutation;
}

/* ============================================================
   שכבה 5: Output
   ============================================================ */
function convertCapitalToMonthlyPension(remainingCapital, conversionFactor) {
  conversionFactor = conversionFactor || 180.0;
  return remainingCapital / conversionFactor;
}

function calculateNewExemptionRate(monthlyExemptPension, eligiblePension) {
  return monthlyExemptPension / eligiblePension;
}

function projectFutureExemption(currentMonthlyExemption, currentYear, targetYear, eligiblePension) {
  if (targetYear <= currentYear) return null;
  const currentParams = getRetirementParams(currentYear);
  const targetParams = getRetirementParams(targetYear);
  const rateDiff = targetParams.exemption_rate - currentParams.exemption_rate;
  const additional = rateDiff * eligiblePension;
  return {
    target_year: targetYear,
    target_exemption_rate: targetParams.exemption_rate,
    rate_diff: rateDiff,
    additional_exemption: additional,
    projected_total_exemption: currentMonthlyExemption + additional
  };
}

/* ============================================================
   Orchestrator
   ============================================================ */
function calculateTikvuvZchuyot(input) {
  const params = getRetirementParams(input.retirement_year);
  const referenceCpi = getReferenceCpiForRetirementYear(input.retirement_year);

  const indexed = input.grants.map(g => indexGrant(g, referenceCpi));
  const penalized = indexed.map(g => applyPenaltyMultiplier(g));

  const grossSum = sumGrantsGross(input.grants);
  const sumAfterPenalty = sumGrantsIndexedAndPenalized(penalized);
  const capInfo = applyYearsOfServiceCap(sumAfterPenalty, input.years_of_service);

  const grantsBreakdown = {
    gross_sum: grossSum,
    indexed_and_penalized_sum: sumAfterPenalty,
    capped_sum: capInfo.post_cap_amount,
    cap_info: capInfo,
    per_grant_details: penalized
  };

  const totalCap = calculateTotalExemptionCap(params);
  const afterGrants = calculateCapitalAfterGrants(totalCap, capInfo.post_cap_amount);
  const totalCommutation = sumCommutations(input.commutations);
  const afterCommutation = calculateCapitalAfterCommutation(afterGrants, totalCommutation);

  const capitalBalances = {
    total_exemption_cap: totalCap,
    after_grants: afterGrants,
    total_commutation: totalCommutation,
    after_commutation: afterCommutation
  };

  const monthlyExemption = convertCapitalToMonthlyPension(afterCommutation, params.conversion_factor);
  const newRate = calculateNewExemptionRate(monthlyExemption, params.eligible_pension);
  const projection = input.projection_target_year
    ? projectFutureExemption(monthlyExemption, input.retirement_year, input.projection_target_year, params.eligible_pension)
    : null;

  return {
    params: params,
    grants_breakdown: grantsBreakdown,
    capital_balances: capitalBalances,
    final_results: {
      monthly_exempt_pension: monthlyExemption,
      new_exemption_rate: newRate,
      projection: projection
    }
  };
}

/* ============================================================
   UI - איסוף קלט מהטופס
   ============================================================ */
function gatherInput() {
  const grants = [];
  for (const el of grantsContainer.querySelectorAll(".grant-item")) {
    const dateStr = el.querySelector(".grant-date").value;
    const amountStr = el.querySelector(".grant-amount").value;
    if (!dateStr || !amountStr) continue;
    const [yy, mm] = dateStr.split("-").map(Number);
    grants.push({
      year: yy,
      month: mm,
      exempt_amount: parseFloat(amountStr)
    });
  }

  const commutations = [];
  for (const el of commutationsContainer.querySelectorAll(".commutation-item")) {
    const amountStr = el.querySelector(".commutation-amount").value;
    if (!amountStr) continue;
    commutations.push(parseFloat(amountStr));
  }

  const projYear = parseInt(document.getElementById("projection-year").value);

  return {
    retirement_year: parseInt(document.getElementById("retirement-year").value),
    years_of_service: parseFloat(document.getElementById("years-of-service").value),
    grants: grants,
    commutations: commutations,
    projection_target_year: !isNaN(projYear) && projYear > 0 ? projYear : null
  };
}

      <div class="result-row"><span class="ref">F4</span><span class="label">שיעור הפטור</span><span class="value">${fmtPercent(result.params.exemption_rate)}</span></div>
      <div class="result-row"><span class="ref">H4</span><span class="label">מכפיל המרה</span><span class="value">${result.params.conversion_factor}</span></div>
    </div>
  `);

  // שכבה 2 - מענקים פר-מענק
  if (result.grants_breakdown.per_grant_details.length > 0) {
    let perGrantHtml = '<div class="result-section"><h3>חישוב פר-מענק (מידוד וקנס 1.35)</h3>';
    result.grants_breakdown.per_grant_details.forEach((g, i) => {
      perGrantHtml += `
        <div style="margin-bottom: 10px; padding: 8px; background: var(--code-bg); border-radius: 4px;">
          <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px;">
            מענק #${i+1} · ${String(g.month).padStart(2,"0")}/${g.year} · מדד יסודי ${g.base_cpi} · מדד ייחוס ${g.reference_cpi}
          </div>
          <div class="result-row"><span class="ref">${i===0?"I9":i===1?"J9":"K9"}</span><span class="label">סכום ברוטו</span><span class="value">${fmtCurrency(g.exempt_amount)}</span></div>
          <div class="result-row"><span class="ref">${i===0?"I12":i===1?"J12":"K12"}</span><span class="label">לאחר מידוד</span><span class="value">${fmtCurrency(g.indexed_amount)}</span></div>
          <div class="result-row"><span class="ref">${i===0?"I13":i===1?"J13":"K13"}</span><span class="label">לאחר קנס 1.35</span><span class="value">${fmtCurrency(g.penalized_amount)}</span></div>
        </div>
      `;
    });
    perGrantHtml += '</div>';
    sections.push(perGrantHtml);
  }

  // שכבה 3 - אגרגציה
  let aggHtml = `
    <div class="result-section">
      <h3>אגרגציה והגבלת תקרת 32 שנה</h3>
      <div class="result-row"><span class="ref">L9</span><span class="label">סכום מענקים גולמי</span><span class="value">${fmtCurrency(result.grants_breakdown.gross_sum)}</span></div>
      <div class="result-row"><span class="ref">—</span><span class="label">סכום ממודד+קנס (לפני תקרה)</span><span class="value">${fmtCurrency(result.grants_breakdown.indexed_and_penalized_sum)}</span></div>
  `;
  if (result.grants_breakdown.cap_info.was_capped) {
    aggHtml += `
      <div class="cap-info">
        <strong>הופעלה תקרת 32 שנה:</strong> יחס תקרה ${fmtRatio(result.grants_breakdown.cap_info.cap_ratio)} (32 ÷ ${result.params.year ? "" : ""}שנות עבודה)
      </div>
    `;
  }
  aggHtml += `
      <div class="result-row"><span class="ref">L13</span><span class="label">סכום סופי לקיזוז</span><span class="value">${fmtCurrency(result.grants_breakdown.capped_sum)}</span></div>
    </div>
  `;
  sections.push(aggHtml);

  // שכבה 4 - יתרות הון
  sections.push(`
    <div class="result-section">
      <h3>יתרות הון</h3>
      <div class="result-row"><span class="ref">B7</span><span class="label">תקרת ההון הפטור הכולל</span><span class="value">${fmtCurrency(result.capital_balances.total_exemption_cap)}</span></div>
      <div class="result-row"><span class="ref">B8</span><span class="label">סה"כ מענקים גולמי</span><span class="value">${fmtCurrency(result.grants_breakdown.gross_sum)}</span></div>
      <div class="result-row"><span class="ref">B9</span><span class="label">מענקים ממודדים+קנס+תקרה</span><span class="value">${fmtCurrency(result.grants_breakdown.capped_sum)}</span></div>
      <div class="result-row"><span class="ref">B10</span><span class="label">יתרה לאחר קיזוז מענקים</span><span class="value">${fmtCurrency(result.capital_balances.after_grants)}</span></div>
      <div class="result-row"><span class="ref">B11</span><span class="label">סה"כ היוון קצבה</span><span class="value">${fmtCurrency(result.capital_balances.total_commutation)}</span></div>
      <div class="result-row"><span class="ref">B12</span><span class="label">יתרת ההון הפטור הסופית</span><span class="value">${fmtCurrency(result.capital_balances.after_commutation)}</span></div>
    </div>
  `);

  // שכבה 5 - פלט סופי
  sections.push(`
    <div class="result-section">
      <h3>תוצאה סופית</h3>
      <div class="result-row highlight"><span class="ref">B13</span><span class="label">קצבה פטורה חודשית</span><span class="value">${fmtCurrency(result.final_results.monthly_exempt_pension)}</span></div>
      <div class="result-row highlight"><span class="ref">B14</span><span class="label">שיעור הפטור החדש (קיבוע)</span><span class="value">${fmtPercent(result.final_results.new_exemption_rate)}</span></div>
    </div>
  `);

  // תחזית
  if (result.final_results.projection) {
    const p = result.final_results.projection;
    sections.push(`
      <div class="result-section">
        <h3>תחזית לשנת ${p.target_year}</h3>
        <div class="result-row"><span class="ref">—</span><span class="label">שיעור פטור צפוי ב-${p.target_year}</span><span class="value">${fmtPercent(p.target_exemption_rate)}</span></div>
        <div class="result-row"><span class="ref">—</span><span class="label">הפרש שיעורים</span><span class="value">${fmtPercent(p.rate_diff)}</span></div>
        <div class="result-row"><span class="ref">B17</span><span class="label">תוספת פטור חודשית</span><span class="value">${fmtCurrency(p.additional_exemption)}</span></div>
        <div class="result-row highlight"><span class="ref">B18</span><span class="label">קצבה פטורה צפויה ב-${p.target_year}</span><span class="value">${fmtCurrency(p.projected_total_exemption)}</span></div>
      </div>
    `);
  }

  c.innerHTML = sections.join("");
}

/* ============================================================
   UI - בדיקת התאמה לאקסל
   ============================================================ */
const EXCEL_EXPECTED = {
  B7: 967517.9999999999, B8: 460951, B9: 588820.7055585894,
  B10: 378697.29444141046, B11: 57000, B12: 321697.29444141046,
  B13: 1787.2071913411692, B14: 0.18952356217827881,
  B17: 943, B18: 2730.207191341169
};

function checkParity(result) {
  const banner = document.getElementById("parity-banner");
  // האם זה התרחיש המדויק של האקסל?
  const isExcelScenario =
    result.params.year === 2025 &&
    Math.abs(result.grants_breakdown.gross_sum - 460951) < 0.01 &&
    Math.abs(result.capital_balances.total_commutation - 57000) < 0.01;

  if (!isExcelScenario) {
    banner.classList.remove("visible");
    return;
  }

  const checks = [
    ["B7", result.capital_balances.total_exemption_cap, EXCEL_EXPECTED.B7],
    ["B8", result.grants_breakdown.gross_sum, EXCEL_EXPECTED.B8],
    ["B9", result.grants_breakdown.capped_sum, EXCEL_EXPECTED.B9],
    ["B10", result.capital_balances.after_grants, EXCEL_EXPECTED.B10],
    ["B12", result.capital_balances.after_commutation, EXCEL_EXPECTED.B12],
    ["B13", result.final_results.monthly_exempt_pension, EXCEL_EXPECTED.B13],
    ["B14", result.final_results.new_exemption_rate, EXCEL_EXPECTED.B14]
  ];
  if (result.final_results.projection) {
    checks.push(["B17", result.final_results.projection.additional_exemption, EXCEL_EXPECTED.B17]);
    checks.push(["B18", result.final_results.projection.projected_total_exemption, EXCEL_EXPECTED.B18]);
  }

  const failed = checks.filter(([_, a, e]) => Math.abs(a - e) > 1e-6);
  if (failed.length === 0) {
    banner.innerHTML = `<strong>✓ התאמה מלאה לאקסל:</strong> כל ${checks.length} הבדיקות עברו (הפרש &lt; 10⁻⁶)`;
    banner.classList.add("visible");
  } else {
    banner.innerHTML = `<strong>⚠ פערים מהאקסל:</strong> ${failed.length} מתוך ${checks.length} בדיקות נכשלו`;
    banner.classList.add("visible");
  }
}

/* ============================================================
   UI - אירועים
   ============================================================ */
function showError(msg) {
  document.getElementById("error-container").innerHTML = `<div class="error-msg">${msg}</div>`;
  document.getElementById("results").classList.remove("visible");
}

function clearError() {
  document.getElementById("error-container").innerHTML = "";
}

document.getElementById("calculate-btn").addEventListener("click", () => {
  clearError();
  try {
    const input = gatherInput();
    if (input.grants.length === 0) {
      showError("יש להזין לפחות מענק אחד (או להוסיף מענק עם סכום 0)");
      return;
    }
    if (!input.retirement_year || isNaN(input.years_of_service)) {
      showError("יש להזין שנת פרישה ושנות עבודה תקינות");
      return;
    }
    const result = calculateTikvuvZchuyot(input);
    renderResults(result);
    checkParity(result);
    document.getElementById("results").classList.add("visible");
  } catch (e) {
    showError("שגיאה בחישוב: " + e.message);
    console.error(e);
  }
});

document.getElementById("load-excel-example").addEventListener("click", () => {
  document.getElementById("retirement-year").value = 2025;
  document.getElementById("years-of-service").value = 38;
  document.getElementById("projection-year").value = 2028;
  grantsContainer.innerHTML = "";
  commutationsContainer.innerHTML = "";
  addGrantRow(2001, 5, 100951);
  addGrantRow(2024, 9, 360000);
  addCommutationRow(57000);
  clearError();
});

document.getElementById("clear-all").addEventListener("click", () => {
  grantsContainer.innerHTML = "";
  commutationsContainer.innerHTML = "";
  document.getElementById("results").classList.remove("visible");
  clearError();
});

/* ============================================================
   אתחול - טעינת דוגמת האקסל אוטומטית
   ============================================================ */
addGrantRow(2001, 5, 100951);
addGrantRow(2024, 9, 360000);
addCommutationRow(57000);
